<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POV Inspeções - Elite V12</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: #ffffff; padding: 15px; margin: 0; }
        .card { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        h2 { margin-top: 0; font-size: 13px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; color: #d4af37; letter-spacing: 2px; }
        
        .btn-acao { background-color: #ffffff; color: #000; border: none; padding: 15px; font-size: 13px; font-weight: 600; border-radius: 6px; width: 100%; margin-bottom: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-acao:active { opacity: 0.8; }
        .btn-guardar { background-color: #d4af37; color: #000; display: none; margin-top: 15px;}
        .btn-pdf { background-color: #d4af37; color: #000; margin-top: 20px; } 
        
        .input-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .input-meta, .select-divisao { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; font-family: inherit; }
        .btn-mic-pequeno { background-color: #222; color: #d4af37; border: 1px solid #333; border-radius: 6px; width: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 16px; }
        .btn-mic-pequeno.recording { background-color: #ff0000; color: #fff; border-color: #ff0000; animation: pulse 1s infinite; }
        
        #moduloCamera { display: none; position: relative; width: 100%; margin-bottom: 15px; border-radius: 8px; overflow: hidden; border: 2px solid #d4af37; background: #000; }
        #videoElement { width: 100%; display: block; object-fit: cover; }
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .grid-line { position: absolute; background: rgba(255, 255, 255, 0.5); box-shadow: 0 0 2px rgba(0,0,0,0.8); }
        .v-line-1 { left: 33.33%; width: 1px; height: 100%; }
        .v-line-2 { left: 66.66%; width: 1px; height: 100%; }
        .h-line-1 { top: 33.33%; width: 100%; height: 1px; }
        .h-line-2 { top: 66.66%; width: 100%; height: 1px; }
        #btnDisparoLente { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: #d4af37; color: #000; border: none; padding: 12px 20px; border-radius: 30px; font-weight: bold; font-size: 12px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        #previewImagem { width: 100%; max-height: 250px; object-fit: cover; border-radius: 6px; margin-bottom: 15px; display: none; border: 1px solid #333; }
        
        .painel-ditado { display: none; align-items: flex-start; gap: 10px; margin-bottom: 10px; background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .btn-icone-mic { background-color: #ff3b30; color: white; border: none; border-radius: 50%; width: 55px; height: 55px; font-size: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; }
        .btn-icone-mic.recording { background-color: #ff0000; animation: pulse 1s infinite; }
        .visor-texto { width: 100%; min-height: 80px; padding: 10px; border-radius: 6px; border: none; background: #0a0a0a; color: #fff; font-size: 14px; resize: none; font-family: inherit; }
        .visor-texto:focus { outline: none; border: 1px solid #d4af37; }
        
        .painel-tags { display: none; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .smart-tag { background: transparent; border: 1px solid #444; color: #aaa; padding: 6px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.2s; }
        .smart-tag:hover, .smart-tag:active { border-color: #d4af37; color: #d4af37; background: rgba(212, 175, 55, 0.1); }

        .status { font-size: 11px; color: #666; margin-bottom: 15px; text-transform: uppercase; text-align: center; font-weight: 600; letter-spacing: 1px; }
        
        #canvasAssinatura { width: 100%; height: 150px; background: #fff; border-radius: 6px; cursor: crosshair; touch-action: none; margin-bottom: 10px; }
        .btn-limpar-canvas { background: transparent; border: 1px solid #666; color: #888; padding: 8px; font-size: 11px; text-transform: uppercase; border-radius: 4px; cursor: pointer; width: 100%; margin-bottom: 15px;}
        
        .foto-item-ui { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid #d4af37; display: flex; align-items: flex-start; gap: 12px; }
        .ui-img-box { width: 60px; height: 60px; border-radius: 4px; background-size: cover; background-position: center; flex-shrink: 0; }
        .foto-item-ui p { font-size: 12px; margin: 0; flex: 1; color: #ccc; line-height: 1.4; white-space: pre-wrap; }
        .badge-categoria { font-size: 9px; background: #333; color: #d4af37; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; margin-bottom: 4px; display: inline-block;}
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="card">
        <h2>📍 1. Módulo White-Label</h2>
        <div class="input-group">
            <input type="text" id="inputAgencia" class="input-meta" placeholder="Agência (Ex: ERA Leiria)" style="border-color: #d4af37;">
        </div>
        <div class="input-group">
            <input type="text" id="inputTitulo" class="input-meta" placeholder="Título (Ex: Moradia T4 Luxo)">
            <button id="micTitulo" class="btn-mic-pequeno">🎙️</button>
        </div>
        <div class="input-group">
            <input type="text" id="inputLocal" class="input-meta" placeholder="Localização (Ex: Cascais, Centro)">
            <button id="micLocal" class="btn-mic-pequeno">🎙️</button>
        </div>
    </div>

    <div class="card">
        <h2>📷 2. Auditoria e Composição Ótica</h2>
        <select id="selectDivisao" class="select-divisao" style="width: 100%; margin-bottom: 15px;">
            <option value="Exterior / Fachada">Exterior / Fachada</option>
            <option value="Hall de Entrada">Hall de Entrada</option>
            <option value="Sala de Estar / Jantar">Sala de Estar / Jantar</option>
            <option value="Cozinha">Cozinha</option>
            <option value="Quarto Principal (Suite)">Quarto Principal (Suite)</option>
            <option value="Quarto">Quarto</option>
            <option value="Casa de Banho">Casa de Banho</option>
            <option value="Escritório">Escritório</option>
            <option value="Garagem">Garagem</option>
            <option value="Jardim / Piscina">Jardim / Piscina</option>
            <option value="Varanda / Terraço">Varanda / Terraço</option>
            <option value="Lavandaria">Lavandaria</option>
            <option value="Cave / Arrumos">Cave / Arrumos</option>
        </select>

        <button id="btnLigarLente" class="btn-acao">ATIVAR LENTE DE PRECISÃO</button>
        
        <div id="moduloCamera">
            <video id="videoElement" autoplay playsinline></video>
            <div class="grid-overlay">
                <div class="grid-line v-line-1"></div><div class="grid-line v-line-2"></div>
                <div class="grid-line h-line-1"></div><div class="grid-line h-line-2"></div>
            </div>
            <button id="btnDisparoLente">📸 ALINHAR E DISPARAR</button>
            <canvas id="canvasOculto" style="display:none;"></canvas>
        </div>
        
        <div class="status" id="micStatus">Pronto para operar.</div>
        
        <img id="previewImagem" src="" alt="Preview">
        
        <div class="painel-ditado" id="painelDitado">
            <button id="btnIconeMic" class="btn-icone-mic">🎙️</button>
            <div style="width: 100%;">
                <textarea id="visorNota" class="visor-texto" placeholder="Dite a nota técnica (m², chão, etc)..."></textarea>
            </div>
        </div>
        
        <div class="painel-tags" id="painelTags">
            <button class="smart-tag" onclick="adicionarTag('☀️ Exposição Solar Privilegiada')">+ Sol</button>
            <button class="smart-tag" onclick="adicionarTag('💎 Acabamentos de Alta Qualidade')">+ Acabamentos</button>
            <button class="smart-tag" onclick="adicionarTag('🔑 Imóvel Pronto a Habitar')">+ Pronto Habitar</button>
            <button class="smart-tag" onclick="adicionarTag('🌳 Vista Desafogada / Zona Tranquila')">+ Vista / Paz</button>
            <button class="smart-tag" onclick="adicionarTag('📐 Áreas Generosas e Funcionais')">+ Áreas</button>
            <button class="smart-tag" onclick="adicionarTag('🛠️ Excelente Estado de Conservação')">+ Conservação</button>
        </div>
        
        <button id="guardarBtn" class="btn-acao btn-guardar">GUARDAR COM GEOLOCALIZAÇÃO</button>
    </div>

    <div class="card">
        <h2>✍️ 3. Assinatura Digital</h2>
        <canvas id="canvasAssinatura"></canvas>
        <button id="btnLimparCanvas" class="btn-limpar-canvas">Limpar Quadro</button>
    </div>

    <div class="card">
        <h2>🗂️ 4. Dossier de Elite</h2>
        <div class="input-group" style="margin-bottom: 20px;">
            <input type="text" id="inputNomePdf" class="input-meta" placeholder="Nome do PDF (Ex: Vistoria_Moradia)">
        </div>
        
        <div id="log-ui">Ainda sem registos na memória.</div>
        <button id="gerarPdfBtn" class="btn-acao btn-pdf">GERAR DOSSIER DE LUXO (PDF)</button>
        <button id="limparBtn" class="btn-acao" style="background-color: transparent; border: 1px solid #333; color: #888; margin-top: 15px;">Formatar Sistema Inteiro</button>
    </div>

    <script>
        const inputAgencia = document.getElementById('inputAgencia');
        const inputTitulo = document.getElementById('inputTitulo');
        const inputLocal = document.getElementById('inputLocal');
        const inputNomePdf = document.getElementById('inputNomePdf');
        const selectDivisao = document.getElementById('selectDivisao');
        const btnLigarLente = document.getElementById('btnLigarLente');
        const moduloCamera = document.getElementById('moduloCamera');
        const videoElement = document.getElementById('videoElement');
        const btnDisparoLente = document.getElementById('btnDisparoLente');
        const canvasOculto = document.getElementById('canvasOculto');
        const previewImagem = document.getElementById('previewImagem');
        const painelDitado = document.getElementById('painelDitado');
        const visorNota = document.getElementById('visorNota');
        const painelTags = document.getElementById('painelTags');
        const guardarBtn = document.getElementById('guardarBtn');
        const micStatus = document.getElementById('micStatus');
        const logUi = document.getElementById('log-ui');
        
        let memoriaApp = JSON.parse(localStorage.getItem('pov_db_v11')) || [];
        let metadados = JSON.parse(localStorage.getItem('pov_meta_v11')) || { agencia: "", titulo: "", local: "" };
        let tempImagemBase64 = "";
        let streamAtivo = null;

        inputAgencia.value = metadados.agencia; inputTitulo.value = metadados.titulo; inputLocal.value = metadados.local;
        function guardarMetadados() {
            metadados = { agencia: inputAgencia.value, titulo: inputTitulo.value, local: inputLocal.value };
            localStorage.setItem('pov_meta_v11', JSON.stringify(metadados));
        }
        inputAgencia.addEventListener('input', guardarMetadados); inputTitulo.addEventListener('input', guardarMetadados); inputLocal.addEventListener('input', guardarMetadados);

        function adicionarTag(textoTag) {
            let textoAtual = visorNota.value.trim();
            let novaLinha = textoAtual.length > 0 ? '\n' : '';
            visorNota.value = textoAtual + novaLinha + '[✓ ' + textoTag + ']';
            guardarBtn.style.display = "block";
        }

        btnLigarLente.addEventListener('click', async () => {
            try {
                streamAtivo = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                videoElement.srcObject = streamAtivo;
                moduloCamera.style.display = "block";
                btnLigarLente.style.display = "none";
                previewImagem.style.display = "none";
                painelDitado.style.display = "none";
                painelTags.style.display = "none";
                guardarBtn.style.display = "none";
                micStatus.innerText = "Alinhe as paredes verticais com as linhas da grelha.";
            } catch (err) {
                alert("Permita o acesso à câmera nas definições do seu navegador.");
                micStatus.innerText = "Acesso à lente negado.";
            }
        });

        btnDisparoLente.addEventListener('click', () => {
            const MAX_WIDTH = 1024;
            let imgWidth = videoElement.videoWidth;
            let imgHeight = videoElement.videoHeight;
            
            if (imgWidth > MAX_WIDTH) {
                imgHeight = imgHeight * (MAX_WIDTH / imgWidth);
                imgWidth = MAX_WIDTH;
            }
            
            canvasOculto.width = imgWidth;
            canvasOculto.height = imgHeight;
            const ctx = canvasOculto.getContext('2d');
            ctx.drawImage(videoElement, 0, 0, imgWidth, imgHeight);
            
            tempImagemBase64 = canvasOculto.toDataURL('image/jpeg', 0.6);
            previewImagem.src = tempImagemBase64;
            
            if (streamAtivo) { streamAtivo.getTracks().forEach(track => track.stop()); }
            moduloCamera.style.display = "none";
            btnLigarLente.style.display = "block";
            previewImagem.style.display = "block";
            painelDitado.style.display = "flex";
            painelTags.style.display = "flex";
            visorNota.value = "";
            micStatus.innerText = "Captura Ótica Sucesso. Dite o relatório.";
            guardarBtn.style.display = "none";
        });

        const canvas = document.getElementById('canvasAssinatura');
        const ctxCanvas = canvas.getContext('2d');
        let assinando = false; let temAssinatura = false;
        function resizeCanvas() { const rect = canvas.getBoundingClientRect(); canvas.width = rect.width; canvas.height = rect.height; ctxCanvas.lineWidth = 2; ctxCanvas.lineCap = 'round'; ctxCanvas.strokeStyle = '#000'; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        function getPos(e) { const rect = canvas.getBoundingClientRect(); const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY; return { x: clientX - rect.left, y: clientY - rect.top }; }
        const startAssinatura = (e) => { assinando = true; const pos = getPos(e); ctxCanvas.beginPath(); ctxCanvas.moveTo(pos.x, pos.y); };
        const drawAssinatura = (e) => { if (assinando) { const pos = getPos(e); ctxCanvas.lineTo(pos.x, pos.y); ctxCanvas.stroke(); temAssinatura = true; } };
        const endAssinatura = () => { assinando = false; };
        canvas.addEventListener('mousedown', startAssinatura); canvas.addEventListener('mousemove', drawAssinatura); canvas.addEventListener('mouseup', endAssinatura);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startAssinatura(e); }, {passive: false}); canvas.addEventListener('touchmove', (e) => { e.preventDefault(); drawAssinatura(e); }, {passive: false}); canvas.addEventListener('touchend', endAssinatura);
        document.getElementById('btnLimparCanvas').addEventListener('click', () => { ctxCanvas.clearRect(0, 0, canvas.width, canvas.height); temAssinatura = false; });

        function renderizarInterface() {
            if(memoriaApp.length === 0) { logUi.innerHTML = "Ainda sem registos na memória."; return; }
            logUi.innerHTML = "";
            memoriaApp.forEach((item, index) => {
                logUi.innerHTML += `<div class="foto-item-ui"><div class="ui-img-box" style="background-image: url('${item.imagem}');"></div><div style="flex:1;"><div class="badge-categoria">${item.categoria}</div><p>${item.texto}</p></div></div>`;
            });
        }
        renderizarInterface();

        visorNota.addEventListener('input', function() { guardarBtn.style.display = (tempImagemBase64 !== "" && visorNota.value.trim().length > 0) ? "block" : "none"; });

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        function ativarDitado(inputId, btnId) {
            if (!SpeechRecognition) return;
            const recognition = new SpeechRecognition(); recognition.continuous = false; recognition.lang = 'pt-PT';
            const inputTarget = document.getElementById(inputId); const btnTarget = document.getElementById(btnId);
            recognition.onstart = () => { btnTarget.classList.add('recording'); };
            recognition.onresult = (e) => { 
                let textoExistente = inputTarget.value.trim();
                let novoTexto = e.results[e.resultIndex][0].transcript.trim(); 
                inputTarget.value = textoExistente.length > 0 ? textoExistente + " " + novoTexto : novoTexto;
                if(inputId === 'visorNota') guardarBtn.style.display = "block"; 
                guardarMetadados(); 
            };
            recognition.onerror = () => { btnTarget.classList.remove('recording'); }; recognition.onend = () => { btnTarget.classList.remove('recording'); };
            try { recognition.start(); } catch(e) {}
        }
        document.getElementById('micTitulo').addEventListener('click', () => ativarDitado('inputTitulo', 'micTitulo'));
        document.getElementById('micLocal').addEventListener('click', () => ativarDitado('inputLocal', 'micLocal'));
        document.getElementById('btnIconeMic').addEventListener('click', () => ativarDitado('visorNota', 'btnIconeMic'));

        guardarBtn.addEventListener('click', function() {
            guardarBtn.style.display = "none"; 
            const concluirGuardar = (coordsText) => {
                memoriaApp.push({ categoria: selectDivisao.value, imagem: tempImagemBase64, texto: visorNota.value.trim(), coordenadas: coordsText, dataHora: new Date().toLocaleString('pt-PT') });
                localStorage.setItem('pov_db_v11', JSON.stringify(memoriaApp));
                renderizarInterface();
                tempImagemBase64 = ""; visorNota.value = ""; previewImagem.style.display = "none"; painelDitado.style.display = "none"; painelTags.style.display = "none"; micStatus.innerText = "Registo de Luxo guardado e indexado.";
            };

            micStatus.innerText = "A buscar satélites GPS...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { concluirGuardar(`LAT: ${pos.coords.latitude.toFixed(5)} | LON: ${pos.coords.longitude.toFixed(5)}`); },
                    (err) => { concluirGuardar("Coordenadas encriptadas / Sinal GPS bloqueado"); },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else { concluirGuardar("GPS não suportado pelo hardware."); }
        });

        // V12: INJEÇÃO DOM FÍSICO (Resolve cortes, esmagamento e assinatura em falta)
        document.getElementById('gerarPdfBtn').addEventListener('click', function() {
            if(memoriaApp.length === 0) { alert("Atenção: Fotografe pelo menos 1 divisão antes de gerar o relatório."); return; }
            
            let nomeFicheiroFinal = inputNomePdf.value.trim();
            if (nomeFicheiroFinal === "") {
                const tituloLimpo = inputTitulo.value.trim().replace(/\s+/g, '_') || 'Imovel';
                nomeFicheiroFinal = `POV_${tituloLimpo}_${new Date().getTime()}.pdf`;
            } else {
                if (!nomeFicheiroFinal.toLowerCase().endsWith('.pdf')) nomeFicheiroFinal += '.pdf';
            }

            micStatus.innerText = "A injetar Shadow DOM para gerar o PDF... Aguarde 2 segundos.";
            this.innerText = "A PROCESSAR...";

            // 1. Cria um contentor escondido na página real (o telemóvel é obrigado a renderizar isto)
            const pdfContainer = document.createElement('div');
            pdfContainer.style.position = 'absolute';
            pdfContainer.style.top = '-9999px';
            pdfContainer.style.left = '0';
            pdfContainer.style.width = '800px'; 
            pdfContainer.style.backgroundColor = '#ffffff';
            pdfContainer.style.color = '#000000';
            pdfContainer.style.padding = '40px';
            pdfContainer.style.fontFamily = "'Montserrat', sans-serif";
            pdfContainer.style.zIndex = '-1';

            // Reduzi a margem inferior do título para a página não ficar vazia
            let htmlString = `
                <div style="text-align: center; border-bottom: 1px solid #e0e0e0; padding-bottom: 20px; margin-bottom: 25px;">
                    <div style="font-weight: 600; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 15px;">
                        ${inputAgencia.value.trim() !== "" ? inputAgencia.value : "POV INSPEÇÕES - ELITE"}
                    </div>
                    <h1 style="font-family: 'Playfair Display', serif; font-weight: 700; font-size: 38px; color: #111; margin: 0 0 10px 0;">
                        ${inputTitulo.value.trim() !== "" ? inputTitulo.value : "Relatório Técnico Exclusivo"}
                    </h1>
                    <div style="font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 2px;">
                        ${inputLocal.value.trim() !== "" ? inputLocal.value : "Localização sob sigilo"}
                    </div>
                </div>
            `;

            // Usa "inline-block" e "float". É impossível o PDF cortar isto a meio.
            memoriaApp.forEach((item, index) => {
                let textoFormatado = item.texto.replace(/\n/g, '<br>');
                htmlString += `
                <div style="page-break-inside: avoid; display: inline-block; width: 100%; margin-bottom: 25px; border-bottom: 1px solid #f0f0f0; padding-bottom: 20px;">
                    <div style="float: left; width: 320px; height: 210px; border: 1px solid #ddd; background-color: #ececec; overflow: hidden;">
                        <img src="${item.imagem}" style="width: 100%; height: 100%; object-fit: cover; display: block;">
                    </div>
                    <div style="margin-left: 350px;">
                        <div style="border-bottom: 1px solid #e0e0e0; padding-bottom: 8px; margin-bottom: 12px;">
                            <span style="font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600; color: #d4af37; text-transform: uppercase; letter-spacing: 2px;">${item.categoria}</span>
                            <span style="font-size: 10px; color: #999; float: right;">REF. 0${index + 1}</span>
                        </div>
                        <p style="font-family: 'Playfair Display', serif; font-size: 14px; color: #222; line-height: 1.6; margin: 0; min-height: 90px;">${textoFormatado}</p>
                        <div style="margin-top: 15px; font-size: 9px; color: #888; font-family: monospace; border-top: 1px dotted #ccc; padding-top: 10px;">
                            ⏳ DATA: ${item.dataHora}<br>🛰️ GPS: ${item.coordenadas}
                        </div>
                    </div>
                </div>
                `;
            });

            if (temAssinatura) {
                const assinaturaBase64 = canvas.toDataURL('image/png');
                htmlString += `
                <div style="page-break-inside: avoid; display: inline-block; width: 100%; margin-top: 30px; text-align: center; border-top: 1px solid #e0e0e0; padding-top: 25px;">
                    <img src="${assinaturaBase64}" style="max-width: 250px; max-height: 100px; display: block; margin: 0 auto; border-bottom: 1px solid #111; padding-bottom: 5px;">
                    <div style="font-family: 'Montserrat', sans-serif; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;">VALIDAÇÃO E ASSINATURA DIGITAL DO PROPRIETÁRIO</div>
                </div>
                `;
            }

            pdfContainer.innerHTML = htmlString;
            document.body.appendChild(pdfContainer);

            // 2. Esperar 1.5 segundos EXACTOS para o Android renderizar a assinatura na memória
            setTimeout(() => {
                const opt = {
                    margin: [15, 15, 15, 15],
                    filename: nomeFicheiroFinal,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, letterRendering: true, windowWidth: 800 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
                };

                html2pdf().set(opt).from(pdfContainer).save().then(() => {
                    // 3. Limpar a prova do crime do DOM
                    document.body.removeChild(pdfContainer);
                    micStatus.innerText = "Dossier emitido com sucesso.";
                    document.getElementById('gerarPdfBtn').innerText = "GERAR DOSSIER DE LUXO (PDF)";
                });
            }, 1500); 
        });

        document.getElementById('limparBtn').addEventListener('click', function() {
            if(confirm("PERIGO: Esta ação apaga toda a memória e limpa a App. Confirma formatação total?")) {
                localStorage.removeItem('pov_db_v11'); localStorage.removeItem('pov_meta_v11'); memoriaApp = [];
                inputAgencia.value = ""; inputTitulo.value = ""; inputLocal.value = ""; inputNomePdf.value = ""; logUi.innerHTML = "Sistema formatado."; ctxCanvas.clearRect(0, 0, canvas.width, canvas.height); temAssinatura = false; previewImagem.style.display = "none"; painelDitado.style.display = "none"; painelTags.style.display = "none";
            }
        });
    </script>
</body>
</html>
